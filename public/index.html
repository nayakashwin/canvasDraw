<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Canvas Draw - Browser-Based Diagramming Application</title>
  
  <!--
    ============================================================================
    HTML HEAD SECTION
    ============================================================================
    
    This section contains meta information and links to resources.
    The actual JavaScript bundle is loaded at the end of the body for performance.
  -->
  
  <!-- Load external stylesheet -->
  <link rel="stylesheet" href="styles.css">
  
  <!-- Basic inline styles for loading screen -->
  <style>
    /* Loading screen shown while JavaScript loads */
    #loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #f0f0f0;
      z-index: 9999;
      font-size: 24px;
      color: #333;
    }
    
    /* Loading spinner animation */
    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #ccc;
      border-top-color: #333;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 20px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  
  <!--
    ============================================================================
    MAIN APPLICATION CONTAINER
    ============================================================================
    
    This div is where our JavaScript application will render everything.
    The app will create the canvas, toolbar, and all UI elements inside here.
  -->
  <div id="app">
    <!-- Loading screen -->
    <div id="loading">
      <div class="spinner"></div>
      <span>Loading Canvas Draw...</span>
    </div>

    <!-- Main content area -->
    <div class="main-content">
      <!-- Canvas container -->
      <div class="canvas-container" id="canvas-container"></div>
    </div>
  </div>
  
  <!--
    ============================================================================
    JAVASCRIPT BUNDLE
    ============================================================================
    
    Webpack will create this bundle file from our TypeScript code.
    The [contenthash] will be replaced with a unique hash based on the content.
    This helps with browser caching.
    
    The script is placed at the end of the body for better page load performance.
  -->
  <script src="bundle.js"></script>
  
</body>
</html>
